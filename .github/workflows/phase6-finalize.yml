name: phase6-finalize

on:
  push:
    branches:
      - agent/phase-6-native-release-hardening
    paths:
      - '.github/workflows/phase6-finalize.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Align native identifiers
        run: |
          python - <<'PY'
          from pathlib import Path

          project = Path('melanintruth-ai/apps/mobile/ios/Runner.xcodeproj/project.pbxproj')
          text = project.read_text()
          text = text.replace(
              'com.hakilixlabs.melanintruthMobile.RunnerTests',
              'com.hakilixlabs.melanintruth.RunnerTests',
          )
          text = text.replace(
              'com.hakilixlabs.melanintruthMobile',
              'com.hakilixlabs.melanintruth',
          )
          project.write_text(text)
          PY
      - name: Format and lock Flutter sources
        working-directory: melanintruth-ai/apps/mobile
        run: |
          dart format lib test integration_test
          flutter pub get
          python tool/verify_native_config.py
      - name: Commit finalised native configuration
        run: |
          rm .github/workflows/phase6-finalize.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Finalize Phase 6 native configuration"
          git push origin HEAD:agent/phase-6-native-release-hardening
