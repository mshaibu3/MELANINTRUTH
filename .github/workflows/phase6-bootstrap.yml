name: phase6-bootstrap

on:
  push:
    branches:
      - agent/phase-6-native-release-hardening
    paths:
      - '.github/workflows/phase6-bootstrap.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-native-projects:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Generate Android and iOS projects
        working-directory: melanintruth-ai/apps/mobile
        run: |
          flutter create \
            --platforms=android,ios \
            --org com.hakilixlabs \
            --project-name melanintruth_mobile \
            .
      - name: Harden native configuration
        run: |
          python - <<'PY'
          from pathlib import Path
          import plistlib

          root = Path('melanintruth-ai/apps/mobile')

          manifest = root / 'android/app/src/main/AndroidManifest.xml'
          text = manifest.read_text()
          permissions = (
              '<uses-permission android:name="android.permission.INTERNET" />\n'
              '    <uses-permission android:name="android.permission.CAMERA" />\n'
              '    <uses-feature android:name="android.hardware.camera" android:required="false" />\n'
          )
          if 'android.permission.CAMERA' not in text:
              text = text.replace('<manifest xmlns:android="http://schemas.android.com/apk/res/android">',
                                  '<manifest xmlns:android="http://schemas.android.com/apk/res/android">\n    ' + permissions)
          if 'android:usesCleartextTraffic' not in text:
              text = text.replace('<application', '<application\n        android:usesCleartextTraffic="false"\n        android:networkSecurityConfig="@xml/network_security_config"')
          manifest.write_text(text)

          network = root / 'android/app/src/main/res/xml/network_security_config.xml'
          network.parent.mkdir(parents=True, exist_ok=True)
          network.write_text('''<?xml version="1.0" encoding="utf-8"?>\n<network-security-config>\n    <base-config cleartextTrafficPermitted="false" />\n</network-security-config>\n''')

          for gradle_name in ('build.gradle.kts', 'build.gradle'):
              gradle = root / 'android/app' / gradle_name
              if not gradle.exists():
                  continue
              g = gradle.read_text()
              g = g.replace('minSdk = flutter.minSdkVersion', 'minSdk = 23')
              g = g.replace('minSdkVersion flutter.minSdkVersion', 'minSdkVersion 23')
              gradle.write_text(g)

          info = root / 'ios/Runner/Info.plist'
          with info.open('rb') as handle:
              data = plistlib.load(handle)
          data['NSCameraUsageDescription'] = (
              'MelaninTruth uses the camera only after consent to capture an image for governed visible-appearance analysis.'
          )
          data['NSAppTransportSecurity'] = {'NSAllowsArbitraryLoads': False}
          with info.open('wb') as handle:
              plistlib.dump(data, handle, sort_keys=False)

          podfile = root / 'ios/Podfile'
          if podfile.exists():
              p = podfile.read_text()
              if "platform :ios, '13.0'" not in p:
                  p = p.replace("# platform :ios, '13.0'", "platform :ios, '13.0'")
                  if "platform :ios" not in p:
                      p = "platform :ios, '13.0'\n\n" + p
              podfile.write_text(p)
          PY
      - name: Commit generated native projects
        run: |
          rm .github/workflows/phase6-bootstrap.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Generate and harden native mobile projects"
          git push origin HEAD:agent/phase-6-native-release-hardening
