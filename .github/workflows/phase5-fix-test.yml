name: phase5-fix-test

on:
  push:
    branches:
      - agent/phase-5-mobile-production-integration
    paths:
      - '.github/workflows/phase5-fix-test.yml'

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Rename conflicting fake capture field
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('melanintruth-ai/apps/mobile/test/gateway_test.dart')
          text = path.read_text()
          text = text.replace('_FakeCaptureSource(this.capture);', '_FakeCaptureSource(this._capturedImage);')
          text = text.replace('final CapturedImage capture;', 'final CapturedImage _capturedImage;')
          text = text.replace('Future<CapturedImage> capture() async => capture;', 'Future<CapturedImage> capture() async => _capturedImage;')
          path.write_text(text)
          PY
      - name: Commit fix and remove temporary workflow
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/phase5-fix-test.yml
          git add melanintruth-ai/apps/mobile/test/gateway_test.dart
          git commit -m "Fix Phase 5 fake capture source naming"
          git push origin HEAD:agent/phase-5-mobile-production-integration
