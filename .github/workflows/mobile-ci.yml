name: mobile-ci

on:
  push:
    paths:
      - 'melanintruth-ai/apps/mobile/**'
      - 'melanintruth-ai/services/api/app/**'
      - 'melanintruth-ai/tests/integration/test_phase7_upload_contract.py'
      - 'docs/api/openapi.json'
      - '.github/workflows/mobile-ci.yml'
  pull_request:
    paths:
      - 'melanintruth-ai/apps/mobile/**'
      - 'melanintruth-ai/services/api/app/**'
      - 'melanintruth-ai/tests/integration/test_phase7_upload_contract.py'
      - 'docs/api/openapi.json'
      - '.github/workflows/mobile-ci.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  phase7-finalize:
    if: >-
      (github.ref == 'refs/heads/agent/phase-7-release-candidate' ||
      github.head_ref == 'agent/phase-7-release-candidate') &&
      hashFiles('melanintruth-ai/apps/mobile/tool/apply_phase7.py') != ''
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/phase-7-release-candidate
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Apply Phase 7 production contracts
        run: python melanintruth-ai/apps/mobile/tool/apply_phase7.py
      - name: Generate and verify contracts
        run: |
          make api-install
          make api-openapi
          cd melanintruth-ai/apps/mobile
          flutter pub get
          dart format lib test integration_test
          python tool/verify_release_candidate.py
      - name: Run focused Phase 7 tests
        run: |
          PYTHONPATH=melanintruth-ai/services/api python -m pytest melanintruth-ai/tests/integration/test_phase7_upload_contract.py
          cd melanintruth-ai/apps/mobile
          flutter test test/gateway_test.dart test/phase7_gateway_test.dart
      - name: Commit finalised Phase 7 contracts
        run: |
          rm -f .github/workflows/phase7-finalize.yml
          rm -f melanintruth-ai/apps/mobile/tool/apply_phase7.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Finalize Phase 7 release-candidate contracts"
          git push origin HEAD:agent/phase-7-release-candidate

  flutter:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: melanintruth-ai/apps/mobile
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - name: Check Dart formatting
        run: dart format --output=none --set-exit-if-changed lib test integration_test
      - name: Analyze Flutter source
        id: analyze
        continue-on-error: true
        run: |
          mkdir -p artifacts
          flutter analyze > artifacts/flutter-analyze.txt 2>&1
          status=$?
          cat artifacts/flutter-analyze.txt
          exit $status
      - name: Run Flutter tests
        id: tests
        if: steps.analyze.outcome == 'success'
        continue-on-error: true
        run: |
          flutter test --coverage > artifacts/flutter-test.txt 2>&1
          status=$?
          cat artifacts/flutter-test.txt
          exit $status
      - name: Upload mobile diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mobile-diagnostics
          path: melanintruth-ai/apps/mobile/artifacts/*.txt
          if-no-files-found: error
      - name: Upload mobile coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mobile-coverage
          path: melanintruth-ai/apps/mobile/coverage/lcov.info
          if-no-files-found: warn
      - name: Enforce mobile verification
        if: always()
        run: |
          test "${{ steps.analyze.outcome }}" = "success"
          test "${{ steps.tests.outcome }}" = "success"
