name: phase5-codex-rewrite

on:
  push:
    branches:
      - agent/phase-5-mobile-production-integration
    paths:
      - '.github/workflows/phase5-codex-rewrite.yml'

permissions:
  contents: write

jobs:
  rewrite:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Update Phase 5 mobile copy
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('melanintruth-ai/apps/mobile/lib/src/app.dart')
          text = path.read_text()
          text = text.replace(
              'Session credentials are held in memory only in this Phase 4 build and are never written to logs.',
              'Access credentials remain in memory. Refresh-session material is stored with platform secure storage and is never written to logs.',
          )
          text = text.replace(
              'Phase 4 preview controls simulate camera telemetry. They do not fabricate or upload image bytes.',
              'The sliders provide capture guidance. Production analysis requests native camera permission and uploads only the selected image bytes.',
          )
          path.write_text(text)
          PY
          dart_file='melanintruth-ai/apps/mobile/lib/src/app.dart'
          test -f "$dart_file"
      - name: Commit copy and remove temporary workflow
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/phase5-codex-rewrite.yml
          git add melanintruth-ai/apps/mobile/lib/src/app.dart
          git commit -m "Update Phase 5 mobile security and capture copy"
          git push origin HEAD:agent/phase-5-mobile-production-integration
