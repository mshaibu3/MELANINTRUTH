name: mobile-native-ci

on:
  push:
    paths:
      - 'melanintruth-ai/apps/mobile/**'
      - '.github/workflows/mobile-native-ci.yml'
  pull_request:
    paths:
      - 'melanintruth-ai/apps/mobile/**'
      - '.github/workflows/mobile-native-ci.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: mobile-native-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  native-contract:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: melanintruth-ai/apps/mobile
    steps:
      - uses: actions/checkout@v4
      - name: Verify native release configuration
        run: python tool/verify_native_config.py

  android-release:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    defaults:
      run:
        working-directory: melanintruth-ai/apps/mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - name: Build unsigned Android release bundle
        run: >-
          flutter build appbundle --release
          --dart-define=MELANINTRUTH_API_BASE_URL=https://api.example.invalid
      - uses: actions/upload-artifact@v4
        with:
          name: melanintruth-android-release-unsigned
          path: melanintruth-ai/apps/mobile/build/app/outputs/bundle/release/app-release.aab
          if-no-files-found: error

  ios-release:
    runs-on: macos-14
    timeout-minutes: 35
    defaults:
      run:
        working-directory: melanintruth-ai/apps/mobile
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - name: Build unsigned iOS release application
        run: >-
          flutter build ios --release --no-codesign
          --dart-define=MELANINTRUTH_API_BASE_URL=https://api.example.invalid
      - uses: actions/upload-artifact@v4
        with:
          name: melanintruth-ios-release-unsigned
          path: melanintruth-ai/apps/mobile/build/ios/iphoneos/Runner.app
          if-no-files-found: error

  android-device-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    defaults:
      run:
        working-directory: melanintruth-ai/apps/mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Enable KVM group permissions
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Cache Android build dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: >-
            android-smoke-${{ runner.os }}-${{
            hashFiles('melanintruth-ai/apps/mobile/android/**/*.gradle*',
            'melanintruth-ai/apps/mobile/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            android-smoke-${{ runner.os }}-
      - run: flutter pub get
      - name: Initialise Android device diagnostics
        run: |
          mkdir -p "$GITHUB_WORKSPACE/native-smoke-artifacts"
          printf 'Android device smoke runner initialised at %s\n' "$(date -u +%FT%TZ)" > "$GITHUB_WORKSPACE/native-smoke-artifacts/runner-status.txt"
      - name: Run consent and accessibility smoke test on Android
        id: smoke
        continue-on-error: true
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_6
          cores: 2
          ram-size: 2048M
          emulator-boot-timeout: 900
          disable-animations: true
          emulator-options: >-
            -no-window -no-snapshot -gpu swiftshader_indirect -noaudio
            -no-boot-anim -camera-back none -camera-front none
          working-directory: melanintruth-ai/apps/mobile
          script: |
            bash -o pipefail -c '
              trap "adb devices -l > $GITHUB_WORKSPACE/native-smoke-artifacts/adb-devices.txt 2>&1 || true; adb logcat -d -t 10000 > $GITHUB_WORKSPACE/native-smoke-artifacts/adb-logcat.txt 2>&1 || true" EXIT
              timeout --foreground --signal=TERM --kill-after=30s 25m \
                flutter test integration_test/app_smoke_test.dart \
                -d emulator-5554 --timeout 5m --no-pub --reporter expanded \
                2>&1 | tee "$GITHUB_WORKSPACE/native-smoke-artifacts/android-device-smoke.txt"
            '
      - name: Upload Android device diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-device-smoke-diagnostics
          path: native-smoke-artifacts/*.txt
          if-no-files-found: error
          retention-days: 14
      - name: Enforce Android device smoke result
        if: always()
        run: test "${{ steps.smoke.outcome }}" = "success"

  native-release-gate:
    if: always()
    needs:
      - native-contract
      - android-release
      - ios-release
      - android-device-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Enforce native verification
        run: |
          test "${{ needs.native-contract.result }}" = "success"
          test "${{ needs.android-release.result }}" = "success"
          test "${{ needs.ios-release.result }}" = "success"
          test "${{ needs.android-device-smoke.result }}" = "success"
