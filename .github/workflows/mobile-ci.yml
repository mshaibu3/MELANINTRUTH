name: mobile-ci

on:
  push:
    paths:
      - 'melanintruth-ai/apps/mobile/**'
      - '.github/workflows/mobile-ci.yml'
  pull_request:
    paths:
      - 'melanintruth-ai/apps/mobile/**'
      - '.github/workflows/mobile-ci.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  flutter:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: melanintruth-ai/apps/mobile
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - name: Check Dart formatting
        run: dart format --output=none lib test
      - name: Analyze Flutter source
        run: |
          mkdir -p artifacts
          set +e
          flutter analyze > artifacts/flutter-analyze.txt 2>&1
          status=$?
          cat artifacts/flutter-analyze.txt
          exit $status
      - name: Upload Flutter analyzer diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mobile-analyzer-diagnostics
          path: melanintruth-ai/apps/mobile/artifacts/flutter-analyze.txt
          if-no-files-found: error
      - run: flutter test --coverage
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mobile-coverage
          path: melanintruth-ai/apps/mobile/coverage/lcov.info
          if-no-files-found: warn
