name: phase6-format

on:
  push:
    branches:
      - agent/phase-6-native-release-hardening
    paths:
      - '.github/workflows/phase6-format.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Canonicalize Phase 6 sources
        working-directory: melanintruth-ai/apps/mobile
        run: |
          flutter pub get
          dart format lib test integration_test
      - name: Commit canonical formatting
        run: |
          rm .github/workflows/phase6-format.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Format Phase 6 Flutter sources"
          git push origin HEAD:agent/phase-6-native-release-hardening
