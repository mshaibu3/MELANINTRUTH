name: phase5-format

on:
  push:
    branches:
      - agent/phase-5-mobile-production-integration
    paths:
      - '.github/workflows/phase5-format.yml'

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: melanintruth-ai/apps/mobile
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: dart format lib test
      - name: Commit formatting and remove temporary workflow
        working-directory: .
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/phase5-format.yml
          git add melanintruth-ai/apps/mobile/lib melanintruth-ai/apps/mobile/test
          git commit -m "Format Phase 5 mobile source"
          git push origin HEAD:agent/phase-5-mobile-production-integration
