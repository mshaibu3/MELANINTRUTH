name: mobile-ci

on:
  push:
    paths:
      - 'melanintruth-ai/apps/mobile/**'
      - '.github/workflows/mobile-ci.yml'
  pull_request:
    paths:
      - 'melanintruth-ai/apps/mobile/**'
      - '.github/workflows/mobile-ci.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  flutter:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: melanintruth-ai/apps/mobile
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - name: Check Dart formatting
        run: dart format --output=none lib test
      - name: Analyze Flutter source
        id: analyze
        continue-on-error: true
        run: |
          mkdir -p artifacts
          flutter analyze > artifacts/flutter-analyze.txt 2>&1
          status=$?
          cat artifacts/flutter-analyze.txt
          exit $status
      - name: Run Flutter tests
        id: tests
        if: steps.analyze.outcome == 'success'
        continue-on-error: true
        run: |
          flutter test --coverage > artifacts/flutter-test.txt 2>&1
          status=$?
          cat artifacts/flutter-test.txt
          exit $status
      - name: Upload mobile diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mobile-diagnostics
          path: melanintruth-ai/apps/mobile/artifacts/*.txt
          if-no-files-found: error
      - name: Upload mobile coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mobile-coverage
          path: melanintruth-ai/apps/mobile/coverage/lcov.info
          if-no-files-found: warn
      - name: Persist mobile reports for repair
        if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main'
        working-directory: .
        run: |
          mkdir -p docs/ci
          cp melanintruth-ai/apps/mobile/artifacts/flutter-analyze.txt docs/ci/mobile-analyzer.txt
          if [ -f melanintruth-ai/apps/mobile/artifacts/flutter-test.txt ]; then
            cp melanintruth-ai/apps/mobile/artifacts/flutter-test.txt docs/ci/mobile-test.txt
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/ci/mobile-analyzer.txt docs/ci/mobile-test.txt 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -m "Capture Flutter mobile diagnostics"
            git push origin HEAD:main
          fi
      - name: Enforce mobile verification
        if: always()
        run: |
          test "${{ steps.analyze.outcome }}" = "success"
          test "${{ steps.tests.outcome }}" = "success"
