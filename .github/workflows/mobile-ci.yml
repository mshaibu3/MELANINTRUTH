name: mobile-ci

on:
  push:
    paths:
      - 'melanintruth-ai/apps/mobile/**'
      - '.github/workflows/mobile-ci.yml'
  pull_request:
    paths:
      - 'melanintruth-ai/apps/mobile/**'
      - '.github/workflows/mobile-ci.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  flutter:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: melanintruth-ai/apps/mobile
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - name: Canonicalize Dart formatting
        run: dart format lib test
      - name: Commit canonical Dart formatting
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        working-directory: .
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add melanintruth-ai/apps/mobile/lib melanintruth-ai/apps/mobile/test
          if ! git diff --cached --quiet; then
            git commit -m "Format Phase 4 Flutter source"
            git push origin HEAD:main
          fi
      - name: Analyze Flutter source
        id: analyze
        continue-on-error: true
        run: |
          mkdir -p artifacts
          flutter analyze > artifacts/flutter-analyze.txt 2>&1
          status=$?
          cat artifacts/flutter-analyze.txt
          exit $status
      - name: Run Flutter tests
        id: tests
        if: steps.analyze.outcome == 'success'
        continue-on-error: true
        run: |
          flutter test --coverage > artifacts/flutter-test.txt 2>&1
          status=$?
          cat artifacts/flutter-test.txt
          exit $status
      - name: Upload mobile diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mobile-diagnostics
          path: melanintruth-ai/apps/mobile/artifacts/*.txt
          if-no-files-found: error
      - name: Upload mobile coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mobile-coverage
          path: melanintruth-ai/apps/mobile/coverage/lcov.info
          if-no-files-found: warn
      - name: Enforce mobile verification
        if: always()
        run: |
          test "${{ steps.analyze.outcome }}" = "success"
          test "${{ steps.tests.outcome }}" = "success"
