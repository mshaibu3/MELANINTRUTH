name: mobile-native-ci

on:
  push:
    paths:
      - 'melanintruth-ai/apps/mobile/**'
      - '.github/workflows/mobile-native-ci.yml'
  pull_request:
    paths:
      - 'melanintruth-ai/apps/mobile/**'
      - '.github/workflows/mobile-native-ci.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  native-contract:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: melanintruth-ai/apps/mobile
    steps:
      - uses: actions/checkout@v4
      - name: Verify native release configuration
        run: python tool/verify_native_config.py

  android-release:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: melanintruth-ai/apps/mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - name: Build unsigned Android release bundle
        run: >-
          flutter build appbundle --release
          --dart-define=MELANINTRUTH_API_BASE_URL=https://api.example.invalid
      - uses: actions/upload-artifact@v4
        with:
          name: melanintruth-android-release-unsigned
          path: melanintruth-ai/apps/mobile/build/app/outputs/bundle/release/app-release.aab
          if-no-files-found: error

  ios-release:
    runs-on: macos-14
    defaults:
      run:
        working-directory: melanintruth-ai/apps/mobile
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - name: Build unsigned iOS release application
        run: >-
          flutter build ios --release --no-codesign
          --dart-define=MELANINTRUTH_API_BASE_URL=https://api.example.invalid
      - uses: actions/upload-artifact@v4
        with:
          name: melanintruth-ios-release-unsigned
          path: melanintruth-ai/apps/mobile/build/ios/iphoneos/Runner.app
          if-no-files-found: error

  android-device-smoke:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: melanintruth-ai/apps/mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - name: Run consent and accessibility smoke test on Android
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_6
          disable-animations: true
          emulator-options: >-
            -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
            -camera-back none -camera-front none
          working-directory: melanintruth-ai/apps/mobile
          script: flutter test integration_test/app_smoke_test.dart -d emulator-5554

  native-release-gate:
    if: always()
    needs:
      - native-contract
      - android-release
      - ios-release
      - android-device-smoke
    runs-on: ubuntu-latest
    steps:
      - name: Enforce Phase 6 native verification
        run: |
          test "${{ needs.native-contract.result }}" = "success"
          test "${{ needs.android-release.result }}" = "success"
          test "${{ needs.ios-release.result }}" = "success"
          test "${{ needs.android-device-smoke.result }}" = "success"
