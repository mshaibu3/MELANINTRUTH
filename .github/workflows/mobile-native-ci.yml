name: mobile-native-ci

on:
  push:
    paths:
      - 'melanintruth-ai/apps/mobile/**'
      - '.github/workflows/mobile-native-ci.yml'
  pull_request:
    paths:
      - 'melanintruth-ai/apps/mobile/**'
      - '.github/workflows/mobile-native-ci.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: mobile-native-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  native-contract:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: melanintruth-ai/apps/mobile
    steps:
      - uses: actions/checkout@v4
      - name: Verify native release configuration
        run: python tool/verify_native_config.py

  android-release:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    defaults:
      run:
        working-directory: melanintruth-ai/apps/mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - name: Build unsigned Android release bundle
        run: >-
          flutter build appbundle --release
          --dart-define=MELANINTRUTH_API_BASE_URL=https://api.example.invalid
      - uses: actions/upload-artifact@v4
        with:
          name: melanintruth-android-release-unsigned
          path: melanintruth-ai/apps/mobile/build/app/outputs/bundle/release/app-release.aab
          if-no-files-found: error

  ios-release:
    runs-on: macos-14
    timeout-minutes: 35
    defaults:
      run:
        working-directory: melanintruth-ai/apps/mobile
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - name: Build unsigned iOS release application
        run: >-
          flutter build ios --release --no-codesign
          --dart-define=MELANINTRUTH_API_BASE_URL=https://api.example.invalid
      - uses: actions/upload-artifact@v4
        with:
          name: melanintruth-ios-release-unsigned
          path: melanintruth-ai/apps/mobile/build/ios/iphoneos/Runner.app
          if-no-files-found: error

  android-device-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 50
    env:
      AVD_NAME: melanintruth_api34_atd
      ANDROID_SYSTEM_IMAGE: system-images;android-34;aosp_atd;x86_64
      DIAGNOSTICS_DIR: ${{ github.workspace }}/native-smoke-artifacts
    defaults:
      run:
        working-directory: melanintruth-ai/apps/mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Cache Android build dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: >-
            android-smoke-${{ runner.os }}-${{
            hashFiles('melanintruth-ai/apps/mobile/android/**/*.gradle*',
            'melanintruth-ai/apps/mobile/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            android-smoke-${{ runner.os }}-
      - run: flutter pub get
      - name: Initialise Android device diagnostics
        run: |
          mkdir -p "$DIAGNOSTICS_DIR"
          printf 'Android device smoke runner initialised at %s\n' \
            "$(date -u +%FT%TZ)" > "$DIAGNOSTICS_DIR/runner-status.txt"
          flutter doctor -v > "$DIAGNOSTICS_DIR/flutter-doctor.txt" 2>&1 || true
      - name: Resolve Android SDK tools
        id: sdk-tools
        continue-on-error: true
        run: |
          set -o pipefail
          {
            printf 'ANDROID_HOME=%s\nANDROID_SDK_ROOT=%s\n' \
              "${ANDROID_HOME:-}" "${ANDROID_SDK_ROOT:-}"
            find "$ANDROID_SDK_ROOT" -maxdepth 5 -type f \
              \( -name sdkmanager -o -name avdmanager \) \
              -print | sort
            SDKMANAGER_PATH="$(find "$ANDROID_SDK_ROOT/cmdline-tools" \
              -type f -name sdkmanager -perm -111 | sort -V | tail -n 1)"
            AVDMANAGER_PATH="$(find "$ANDROID_SDK_ROOT/cmdline-tools" \
              -type f -name avdmanager -perm -111 | sort -V | tail -n 1)"
            test -x "$SDKMANAGER_PATH"
            test -x "$AVDMANAGER_PATH"
            printf 'SDKMANAGER=%s\nAVDMANAGER=%s\n' \
              "$SDKMANAGER_PATH" "$AVDMANAGER_PATH" >> "$GITHUB_ENV"
            printf '%s\n%s\n%s\n' \
              "$(dirname "$SDKMANAGER_PATH")" \
              "$ANDROID_SDK_ROOT/platform-tools" \
              "$ANDROID_SDK_ROOT/emulator" >> "$GITHUB_PATH"
          } 2>&1 | tee "$DIAGNOSTICS_DIR/sdk-tools.txt"
      - name: Install and configure Android ATD
        id: prepare
        if: steps.sdk-tools.outcome == 'success'
        continue-on-error: true
        run: |
          set -o pipefail
          {
            yes | "$SDKMANAGER" --licenses >/dev/null || true
            "$SDKMANAGER" --install \
              "platform-tools" \
              "emulator" \
              "$ANDROID_SYSTEM_IMAGE"
            test -x "$ANDROID_SDK_ROOT/emulator/emulator"
            echo no | "$AVDMANAGER" create avd \
              --force \
              --name "$AVD_NAME" \
              --package "$ANDROID_SYSTEM_IMAGE"
            cat >> "$HOME/.android/avd/$AVD_NAME.avd/config.ini" <<'EOF'
          hw.cpu.ncore=2
          hw.ramSize=2048
          hw.gpu.enabled=yes
          hw.gpu.mode=swiftshader_indirect
          disk.dataPartition.size=2048M
          EOF
            "$AVDMANAGER" list avd
          } 2>&1 | tee "$DIAGNOSTICS_DIR/avd-prepare.txt"
      - name: Boot Android ATD without hardware acceleration
        id: boot
        if: steps.prepare.outcome == 'success'
        continue-on-error: true
        run: |
          set -o pipefail
          {
            nohup "$ANDROID_SDK_ROOT/emulator/emulator" \
              -avd "$AVD_NAME" \
              -accel off \
              -no-window \
              -no-snapshot \
              -noaudio \
              -no-boot-anim \
              -gpu swiftshader_indirect \
              > "$DIAGNOSTICS_DIR/emulator-console.txt" 2>&1 &
            echo $! > "$DIAGNOSTICS_DIR/emulator.pid"
            timeout --foreground --signal=TERM --kill-after=30s 20m bash -c '
              adb wait-for-device
              until [ "$(adb shell getprop sys.boot_completed 2>/dev/null | tr -d "\r")" = "1" ]; do
                sleep 5
              done
            '
            adb shell input keyevent 82 || true
            adb devices -l
          } 2>&1 | tee "$DIAGNOSTICS_DIR/emulator-boot.txt"
      - name: Run consent and accessibility smoke test on Android
        id: smoke
        if: steps.boot.outcome == 'success'
        continue-on-error: true
        run: |
          set -o pipefail
          timeout --foreground --signal=TERM --kill-after=30s 20m \
            flutter test integration_test/app_smoke_test.dart \
            -d emulator-5554 --timeout 5m --no-pub --reporter expanded \
            2>&1 | tee "$DIAGNOSTICS_DIR/android-device-smoke.txt"
      - name: Capture Android device diagnostics
        if: always()
        run: |
          adb devices -l > "$DIAGNOSTICS_DIR/adb-devices.txt" 2>&1 || true
          adb shell getprop > "$DIAGNOSTICS_DIR/adb-getprop.txt" 2>&1 || true
          adb logcat -d -t 15000 > "$DIAGNOSTICS_DIR/adb-logcat.txt" 2>&1 || true
          ps auxww > "$DIAGNOSTICS_DIR/processes.txt" 2>&1 || true
          cp "$HOME/.android/avd/$AVD_NAME.avd/config.ini" \
            "$DIAGNOSTICS_DIR/avd-config.ini.txt" 2>/dev/null || true
      - name: Upload Android device diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-device-smoke-diagnostics
          path: native-smoke-artifacts/*
          if-no-files-found: error
          retention-days: 14
      - name: Stop Android ATD
        if: always()
        run: |
          adb emu kill >/dev/null 2>&1 || true
          if [ -f "$DIAGNOSTICS_DIR/emulator.pid" ]; then
            kill "$(cat "$DIAGNOSTICS_DIR/emulator.pid")" >/dev/null 2>&1 || true
          fi
      - name: Enforce Android device smoke result
        if: always()
        run: |
          test "${{ steps.sdk-tools.outcome }}" = "success"
          test "${{ steps.prepare.outcome }}" = "success"
          test "${{ steps.boot.outcome }}" = "success"
          test "${{ steps.smoke.outcome }}" = "success"

  native-release-gate:
    if: always()
    needs:
      - native-contract
      - android-release
      - ios-release
      - android-device-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Enforce native verification
        run: |
          test "${{ needs.native-contract.result }}" = "success"
          test "${{ needs.android-release.result }}" = "success"
          test "${{ needs.ios-release.result }}" = "success"
          test "${{ needs.android-device-smoke.result }}" = "success"
